spring:
  h2:
    console:
      enabled: true
      path: /h2-console
  datasource:
    url: jdbc:h2:mem:testdb
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: update # 💡 기존 테이블 유지하며 업데이트
    show-sql: true
    # 💡 [핵심 추가] 테이블 생성 후 data.sql이 실행되도록 순서를 조정합니다.
    defer-datasource-initialization: true
  sql:
    init:
      mode: always # 💡 서버 켤 때마다 data.sql을 실행합니다.